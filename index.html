<body>
  <main class="app-shell">
    <header class="app-header">
      <p class="kicker">Synth Looper</p>
      <h1>Interface Haze</h1>
    </header>

    <button id="toggle" aria-pressed="false">ON</button>

    <section class="sequencer-stack" aria-label="Step sequencer">
      <div id="seq-top" class="sequencer"></div>
      <div id="seq-mid" class="sequencer"></div>
      <div id="seq-bot" class="sequencer"></div>
    </section>

    <section class="controls wide-controls">
      <div class="sliders">
        <div class="slider-group">
          <label for="drift">Drift</label>
          <button id="drift" aria-pressed="false">Drift: Off</button>
        </div>
        <div class="slider-group">
          <label for="volume">Volume</label>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.3" />
        </div>
      </div>
      <p class="instructions">
        Click buttons, adjust volume.<br>
        No sound on mobile? Try turning off Silent Mode.<br>
        It would be very helpful if you filled out a 2-min survey here:<br>
        <a href="https://forms.gle/UkwbVyk88GaSN4i78" target="_blank">https://forms.gle/UkwbVyk88GaSN4i78</a>
      </p>
    </section>
  </main>

  <!-- Audio + app scripts -->
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script src="script.js"></script>
</body>
